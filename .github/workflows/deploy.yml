name: Deploy (Vercel)

# O GitHub Actions é o "cérebro" da automação (requisito do projeto):
# ele constrói o app e dispara o deploy no Vercel.
#  - push na main  -> publica em PRODUÇÃO
#  - pull request   -> publica uma PRÉ-VISUALIZAÇÃO e comenta o link na PR
#
# Precisa de 3 segredos no repositório (Settings > Secrets and variables > Actions):
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Enquanto eles não existirem, este workflow é pulado automaticamente.

on:
  push:
    branches: [main]
  pull_request:

# Cancela deploys antigos do mesmo branch quando chega um novo commit.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Só roda se o token do Vercel estiver configurado.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checar se o Vercel está configurado
        id: guard
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "configurado=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN ainda não configurado — pulando o deploy."
          else
            echo "configurado=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.configurado == 'true'

      - name: Configurar Node
        if: steps.guard.outputs.configurado == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar Vercel CLI
        if: steps.guard.outputs.configurado == 'true'
        run: npm install --global vercel@latest

      - name: Definir ambiente (produção x pré-visualização)
        if: steps.guard.outputs.configurado == 'true'
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "alvo=production" >> "$GITHUB_OUTPUT"
            echo "flag_prod=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "alvo=preview" >> "$GITHUB_OUTPUT"
            echo "flag_prod=" >> "$GITHUB_OUTPUT"
          fi

      - name: Puxar configurações do Vercel
        if: steps.guard.outputs.configurado == 'true'
        run: vercel pull --yes --environment=${{ steps.env.outputs.alvo }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build no Vercel
        if: steps.guard.outputs.configurado == 'true'
        run: vercel build ${{ steps.env.outputs.flag_prod }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy no Vercel
        if: steps.guard.outputs.configurado == 'true'
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt ${{ steps.env.outputs.flag_prod }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "### 🧩 App publicado" >> "$GITHUB_STEP_SUMMARY"
          echo "$url" >> "$GITHUB_STEP_SUMMARY"

      - name: Comentar link de pré-visualização na PR
        if: steps.guard.outputs.configurado == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}'
            const corpo = `🧩 **Pré-visualização desta PR**\n\nAbra no celular para testar: ${url}`
            const { data: comentarios } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const meu = comentarios.find((c) => c.body.includes('Pré-visualização desta PR'))
            if (meu) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: meu.id,
                body: corpo,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: corpo,
              })
            }

<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo verde com sangria total (bom para ícone "maskable") -->
  <rect width="512" height="512" fill="#2e7d32" />

  <!-- Cartão claro com a paisagem -->
  <rect x="64" y="64" width="384" height="384" rx="56" fill="#fbf7ef" />

  <!-- Recorte para a paisagem -->
  <clipPath id="cena">
    <rect x="64" y="64" width="384" height="384" rx="56" />
  </clipPath>

  <g clip-path="url(#cena)">
    <!-- Céu -->
    <rect x="64" y="64" width="384" height="240" fill="#cfeafe" />
    <!-- Sol -->
    <circle cx="180" cy="170" r="48" fill="#f4a93b" />
    <!-- Montanha de trás -->
    <path d="M64 320 L210 170 L320 290 L360 250 L448 340 L448 304 L448 320 Z" fill="#43a047" />
    <!-- Montanha da frente -->
    <path d="M64 360 L180 250 L300 360 Z" fill="#2e7d32" />
    <!-- Chão -->
    <rect x="64" y="320" width="384" height="128" fill="#43a047" />

    <!-- Linhas sutis sugerindo peças de quebra-cabeça sobre a paisagem -->
    <g stroke="#fbf7ef" stroke-width="6" opacity="0.55" fill="none">
      <line x1="192" y1="64" x2="192" y2="448" />
      <line x1="320" y1="64" x2="320" y2="448" />
      <line x1="64" y1="192" x2="448" y2="192" />
      <line x1="64" y1="320" x2="448" y2="320" />
    </g>
  </g>
</svg>
